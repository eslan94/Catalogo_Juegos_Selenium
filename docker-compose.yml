version: '3.8'

services:
  # Base de Datos (PostgreSQL)
  db-juegos:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: user_pro
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net-proyecto

  # Backend (Spring Boot)
  api-juegos:
    build: ./backend
    container_name: spring_api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db-juegos:5432/game_db
      - SPRING_DATASOURCE_USERNAME=user_pro
      - SPRING_DATASOURCE_PASSWORD=password123
    depends_on:
      - db-juegos
    networks:
      - net-proyecto
    restart: on-failure

  # Frontend (Angular + Nginx)
  frontend-web:
    build: ./frontend
    container_name: angular_app
    ports:
      - "80:80"
    depends_on:
      - api-juegos
    networks:
      - net-proyecto

  # Dashboard de Análisis (Streamlit)
  streamlit-dashboard:
    build: ./dashboard
    container_name: python_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api-juegos
    networks:
      - net-proyecto
    restart: always

networks:
  net-proyecto:
    driver: bridge

volumes:
  postgres_data: