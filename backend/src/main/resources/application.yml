spring:
  datasource:
    # URL de conexión usando el nombre del servicio definido en docker-compose
    url: jdbc:postgresql://db-juegos:5432/db_catalogo
    username: admin_gamer
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    #Crea las tablas automáticamente
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # Evita que la conexión se cierre prematuramente
    open-in-view: true

server:
  port: 8080