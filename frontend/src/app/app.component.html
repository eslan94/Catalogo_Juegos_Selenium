<div class="main-wrapper">
  <div *ngIf="!isLoggedIn" class="login-screen">
    <div class="login-card">
      <h2>🔐 Acceso al Sistema</h2>
      <div class="form-body">
        <input type="text" [(ngModel)]="usuario.username" placeholder="Usuario">
        <input type="password" [(ngModel)]="usuario.password" placeholder="Contraseña">
        <button class="btn-primary" (click)="login()">Ingresar</button>
      </div>
    </div>
  </div>

  <div *ngIf="isLoggedIn" class="dashboard-container">
    <header class="top-bar">
      <div class="logo">🎮 <span>GamerVault</span></div>
      <button class="btn-exit" (click)="logout()">Cerrar Sesión</button>
    </header>

    <section class="hero-banner">
      <div class="hero-overlay">
        <div class="hero-content">
          <h1>Tu Biblioteca de Juegos</h1>
          <p>Gestión automatizada con persistencia en PostgreSQL.</p>
        </div>
      </div>
    </section>

    <main class="content">
      <section class="action-card">
        <h3>Añadir Nuevo Título</h3>
        <div class="input-grid">
          <input [(ngModel)]="nuevoJuego.title" placeholder="Título">
          
          <div class="select-wrapper">
            <select [(ngModel)]="nuevoJuego.platform" class="custom-select">
              <option value="" disabled selected>Plataforma...</option>
              <option value="PC">PC Master Race 💻</option>
              <option value="PS5">PlayStation 5 🎮</option>
              <option value="Xbox">Xbox Series X 💚</option>
              <option value="Switch">Nintendo Switch 🔴</option>
            </select>
          </div>

          <div class="select-wrapper">
            <select [(ngModel)]="nuevoJuego.rating" class="custom-select">
              <option [ngValue]="1">1 Estrella ⭐</option>
              <option [ngValue]="2">2 Estrellas ⭐⭐</option>
              <option [ngValue]="3">3 Estrellas ⭐⭐⭐</option>
              <option [ngValue]="4">4 Estrellas ⭐⭐⭐⭐</option>
              <option [ngValue]="5">5 Estrellas ⭐⭐⭐⭐⭐</option>
            </select>
          </div>

          <input [(ngModel)]="nuevoJuego.genre" placeholder="Género">
          <input [(ngModel)]="nuevoJuego.imageUrl" placeholder="URL de la Portada">
          <button class="btn-add" (click)="registrar()">Guardar</button>
        </div>
      </section>

      <section class="game-grid">
        <div *ngFor="let juego of juegos" class="game-card">
          <div class="card-image">
            <img [src]="juego.imageUrl || 'https://via.placeholder.com/300x450?text=Sin+Portada'" [alt]="juego.title">
            <span class="platform-badge">{{ juego.platform }}</span>
      
            <button class="btn-delete-card" (click)="eliminar(juego.id)" title="Eliminar Juego">×</button>
            </div>
    
          <div class="card-content">
            <h4 class="game-title">{{ juego.title }}</h4>
            <p class="game-genre">{{ juego.genre }}</p>
      
            <div class="rating-stars">
              <span *ngFor="let s of getStars(juego.rating)" class="star filled">★</span>
              <span *ngFor="let e of getEmptyStars(juego.rating)" class="star">☆</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>
